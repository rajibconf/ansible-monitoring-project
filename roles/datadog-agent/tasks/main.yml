---
- name: Install Datadog agent
  import_role:
    name: datadog.datadog.agent
  vars:
    datadog_api_key: "{{ datadog_api_key | default('YOUR_API_KEY') }}"
    datadog_site: "datadoghq.com"
    datadog_config:
      tags:
        - "env:{{ env | default('production') }}"
        - "role:{{ role | default('monitoring') }}"
