---
- name: Rolling upgrade for prometheus nodes
  hosts: prometheus
  serial: 1
  max_fail_percentage: 20
  tasks:
    - name: Pull new prometheus image
      community.docker.docker_image:
        name: prom/prometheus:{{ prometheus_version }}
        source: pull
      become: true

    - name: Restart prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:{{ prometheus_version }}
        state: restarted
      become: true

    - name: Validate prometheus health
      uri:
        url: "http://localhost:9090/-/ready"
        method: GET
        status_code: 200
      retries: 5
      delay: 5
      register: health
      until: health.status == 200
